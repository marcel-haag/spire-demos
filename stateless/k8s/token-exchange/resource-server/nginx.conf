server {
    listen 80;

    location / {
        # Envoy's jwt_authn filter already verified the Bearer token's signature
        # and forwarded its decoded payload in this header (base64url JSON).
        # Echoing it back in the response proves the resource server saw a
        # cryptographically verified sub/act, not just an unchecked claim.
        add_header X-Jwt-Payload $http_x_jwt_payload always;
        default_type text/plain;
        return 200 "resource-server: verified token accepted\n";
    }
}
